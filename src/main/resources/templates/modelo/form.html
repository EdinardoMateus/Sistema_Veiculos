<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:if="${modelo.id == null}">Novo Modelo</title>
    <title th:unless="${modelo.id == null}">Editar Modelo</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">...</nav>

<div class="container mt-4">
    <h2 th:text="${modelo.id == null} ? 'Novo Modelo' : 'Editar Modelo'">Formulário</h2>

    <form th:action="@{/modelos/salvar}" method="post" th:object="${modelo}">
        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 th:text="${marca.id == null} ? 'Nova Marca' : 'Editar Marca'">Formulário</h2>
                <a th:href="@{/}" class="btn btn-outline-secondary">
                    <i class="bi bi-house-door"></i> Home
                </a>
            </div>
            <!-- formulário existente -->
        </div>
        <input type="hidden" name="id" th:value="*{id}" />

        <div class="mb-3">
            <label class="form-label">Nome:</label>
            <input type="text" name="nome" class="form-control" th:value="*{nome}" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Marca:</label>
            <select name="marca.id" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="m : ${marcas}" th:value="${m.id}" th:text="${m.nome}" th:selected="${modelo.marca != null and modelo.marca.id == m.id}"></option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Salvar</button>
        <a th:href="@{/modelos}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
