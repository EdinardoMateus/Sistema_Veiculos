<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Veículos</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">...</nav>

<div class="container mt-4">

    <form th:action="@{/veiculos/filtrar}" method="get" class="row g-3 mb-4">
        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1>Consulta Avançada</h1>
                <a th:href="@{/}" class="btn btn-outline-secondary">
                    <i class="bi bi-house-door"></i> Home
                </a>
            </div>
            <!-- conteúdo existente -->
        </div>
        <div class="col-md-3">
            <label class="form-label">Marca:</label>
            <select name="marca" class="form-select">
                <option value="">Todas</option>
                <option th:each="m : ${marcas}" th:value="${m.nome}" th:text="${m.nome}" th:selected="${filtroMarca == m.nome}"></option>
            </select>
        </div>

        <div class="col-md-3">
            <label class="form-label">Modelo:</label>
            <input type="text" name="modelo" class="form-control" placeholder="parte do nome" th:value="${filtroModelo}" />
        </div>

        <div class="col-md-2">
            <label class="form-label">Ano mínimo:</label>
            <input type="number" name="anoMin" class="form-control" th:value="${filtroAnoMin}" />
        </div>

        <div class="col-md-2">
            <label class="form-label">Ano máximo:</label>
            <input type="number" name="anoMax" class="form-control" th:value="${filtroAnoMax}" />
        </div>

        <div class="col-md-2">
            <label class="form-label">Preço mínimo:</label>
            <input type="number" step="0.01" name="precoMin" class="form-control" th:value="${filtroPrecoMin}" />
        </div>

        <div class="col-md-2">
            <label class="form-label">Preço máximo:</label>
            <input type="number" step="0.01" name="precoMax" class="form-control" th:value="${filtroPrecoMax}" />
        </div>

        <div class="col-md-2">
            <label class="form-label">Status:</label>
            <select name="status" class="form-select">
                <option value="">Todos</option>
                <option th:each="s : ${statusList}" th:value="${s}" th:text="${s}" th:selected="${filtroStatus == s}"></option>
            </select>
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-primary">Filtrar</button>
            <a th:href="@{/veiculos/consulta}" class="btn btn-secondary">Limpar</a>
        </div>
    </form>

    <h2>Resultados</h2>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Marca</th>
            <th>Modelo</th>
            <th>Ano</th>
            <th>Cor</th>
            <th>Preço</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(veiculos)}">
            <td colspan="7" class="text-center">Nenhum veículo encontrado.</td>
        </tr>
        <tr th:each="v : ${veiculos}">
            <td th:text="${v.modelo.marca.nome}">Toyota</td>
            <td th:text="${v.modelo.nome}">Corolla</td>
            <td th:text="${v.anoFabricacao}">2022</td>
            <td th:text="${v.cor}">Prata</td>
            <td th:text="${#numbers.formatDecimal(v.preco, 0, 'COMMA', 2, 'POINT')}">95.000,00</td>
            <td th:text="${v.status}">DISPONIVEL</td>
            <td>
                <a th:href="@{/veiculos/editar/{id}(id=${v.id})}" class="btn btn-sm btn-warning">Editar</a>
                <a th:href="@{/veiculos/deletar/{id}(id=${v.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Remover?')">Remover</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
