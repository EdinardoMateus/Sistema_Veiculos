<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Veículos</title>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1>Lista de [Marca/Modelo/Veículos]</h1>
            <a th:href="@{/}" class="btn btn-outline-secondary">
                <i class="bi bi-house-door"></i> Home
            </a>
        </div>
        <!-- resto do conteúdo -->
    </div>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments :: menu}"></div>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">...</nav>

<div class="container mt-4">
    <h1>Veículos em Estoque</h1>
    <a th:href="@{/veiculos/novo}" class="btn btn-primary mb-3">Novo Veículo</a>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Marca</th>
            <th>Modelo</th>
            <th>Ano</th>
            <th>Cor</th>
            <th>Preço</th>
            <th>Km</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="v : ${veiculos}">
            <td th:text="${v.id}">1</td>
            <td th:text="${v.modelo.marca.nome}">Toyota</td>
            <td th:text="${v.modelo.nome}">Corolla</td>
            <td th:text="${v.anoFabricacao}">2022</td>
            <td th:text="${v.cor}">Prata</td>
            <td th:text="${#numbers.formatDecimal(v.preco, 0, 'COMMA', 2, 'POINT')}">95.000,00</td>
            <td th:text="${v.quilometragem}">15000</td>
            <td th:text="${v.status}">DISPONIVEL</td>
            <td>
                <a th:href="@{/veiculos/editar/{id}(id=${v.id})}" class="btn btn-sm btn-warning">Editar</a>
                <a th:href="@{/veiculos/deletar/{id}(id=${v.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Remover veículo?')">Remover</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
