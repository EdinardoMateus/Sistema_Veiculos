<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Lista de Marcas</title>
  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1>Lista de [Marca/Modelo/Veículos]</h1>
      <a th:href="@{/}" class="btn btn-outline-secondary">
        <i class="bi bi-house-door"></i> Home
      </a>
    </div>
    <!-- resto do conteúdo -->
  </div>
  <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">...</nav> <!-- copiar do index -->

<div class="container mt-4">
  <h1>Marcas</h1>
  <a th:href="@{/marcas/novo}" class="btn btn-primary mb-3">Nova Marca</a>

  <table class="table table-striped">
    <thead>
    <tr>
      <th>ID</th>
      <th>Nome</th>
      <th>Ações</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="m : ${marcas}">
      <td th:text="${m.id}">1</td>
      <td th:text="${m.nome}">Toyota</td>
      <td>
        <a th:href="@{/marcas/editar/{id}(id=${m.id})}" class="btn btn-sm btn-warning">Editar</a>
        <a th:href="@{/marcas/deletar/{id}(id=${m.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Remover marca?')">Remover</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
